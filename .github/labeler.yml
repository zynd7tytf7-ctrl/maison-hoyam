# Autogenerated PR labels based on changed files
frontend:
  - changed-files:
      - any-glob-to-any-file: ['components/**', 'app/**', 'hooks/**', 'tailwind.config.*', 'app/globals.css']

backend:
  - changed-files:
      - any-glob-to-any-file: ['prisma/**', 'app/api/**', 'lib/**']

dependencies:
  - changed-files:
      - any-glob-to-any-file: ['package.json', 'pnpm-lock.yaml', 'bun.lock', 'pnpm-workspace.yaml']

ci:
  - changed-files:
      - any-glob-to-any-file: ['.github/**', '.vscode/**']

documentation:
  - changed-files:
      - any-glob-to-any-file: ['*.md', 'docs/**', 'STYLE_GUIDE.md', 'TODO.md']

typescript:
  - changed-files:
      - any-glob-to-any-file: ['**/*.ts', '**/*.tsx', 'tsconfig.json']

size/XS:
  - changed-files:
      - any-glob-to-any-file: ['**']
  - all:
      - changed-files:
          - any-glob-to-any-file: ['**']
