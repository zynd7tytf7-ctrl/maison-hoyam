version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Riyadh
    versioning-strategy: increase
    open-pull-requests-limit: 15
    labels:
      - dependencies
      - automated
    groups:
      nextjs:
        patterns:
          - 'next'
          - 'next-auth'
          - 'eslint-config-next'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      prisma:
        patterns:
          - 'prisma'
          - '@prisma/client'
          - '@next-auth/prisma-adapter'
      radix-ui:
        patterns:
          - '@radix-ui/*'
      tailwind:
        patterns:
          - 'tailwindcss'
          - 'tailwindcss-animate'
          - 'tailwind-merge'
          - '@tailwindcss/*'
      eslint:
        patterns:
          - 'eslint*'
          - '@typescript-eslint/*'
    ignore:
      - dependency-name: 'next'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'react'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'react-dom'
        update-types:
          - 'version-update:semver-major'
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Riyadh
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    groups:
      actions:
        patterns:
          - '*'
    commit-message:
      prefix: ci
      include: scope
